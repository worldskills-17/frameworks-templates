<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Task - all three stacks</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #333; margin: 0; padding: 2rem; }
        h1 { color: #003764; }
        .stack { background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 1rem; margin-bottom: 1rem; max-width: 560px; }
        .stack h2 { margin-top: 0; font-size: 1rem; color: #003764; }
        pre { background: #f0f0f0; padding: 0.5rem; border-radius: 3px; min-height: 1.2em; }
        .ok { color: #28a745; } .fail { color: #da291c; }
    </style>
</head>
<body>
    <h1>Demo Task</h1>
    <p>This page is served statically (vanilla). The two panels below fetch the PHP and Node endpoints of this task.</p>

    <div class="stack">
        <h2>PHP endpoint - <code>php/index.php</code></h2>
        <pre id="php-result">loading...</pre>
    </div>

    <div class="stack">
        <h2>Node endpoint - <code>node/</code> (proxied to this task's Node server)</h2>
        <pre id="node-result">loading...</pre>
    </div>

    <script>
        function probe(url, target) {
            fetch(url)
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    var el = document.getElementById(target);
                    el.textContent = JSON.stringify(data, null, 2);
                    el.className = 'ok';
                })
                .catch(function (err) {
                    var el = document.getElementById(target);
                    el.textContent = 'FAILED: ' + err;
                    el.className = 'fail';
                });
        }
        probe('php/index.php', 'php-result');
        probe('node/status', 'node-result');
    </script>
</body>
</html>
